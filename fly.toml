app = 'immunity-app'
primary_region = 'yyz'

[build]
  dockerfile = '.flyio/Dockerfile'

[env]
  APP_ENV = 'production'
  APP_DEBUG = 'false'
  APP_TIMEZONE = 'UTC'
  DB_HOST = 'localhost'
  DB_PORT = '5432'
  DB_NAME = 'immunity'
  DB_USERNAME = 'immunity'

# The database now lives in the immunity-db Postgres-flex app and is
# reached via the DATABASE_URL secret over flycast; the local Postgres
# previously embedded in this image is no longer used. The pg_data volume
# mount was removed in 2026-04 because the existing machines have run
# without it for some time (no attached volumes), and the rolling-deploy
# requirement to provision new pg_data volumes per machine was blocking
# normal deploys.

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
