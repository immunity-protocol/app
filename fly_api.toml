app = 'immunity-api'
primary_region = 'yyz'

[build]
  dockerfile = '.flyio/Dockerfile.app'

[env]
  APP_ENV     = 'production'
  APP_DEBUG   = 'false'
  APP_TIMEZONE = 'UTC'
  MODE        = 'API'
  DB_HOST     = 'immunity-db.internal'
  DB_PORT     = '5432'
  DB_NAME     = 'immunity'
  DB_USERNAME = 'dev'

# DB_PASSWORD and CRON_TOKEN are injected via `fly secrets set`.

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
