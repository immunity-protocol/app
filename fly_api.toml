app = 'immunity-api'
primary_region = 'yyz'

[build]
  dockerfile = '.flyio/Dockerfile.app'

[env]
  INDEXER_PRICE_OVERRIDES = '{"0xF4F4d4f459b339c7234511547880E101073DCbCd":"1.0","0x479504943734d01548B2975227Bb6BfCF725c222":"3500.0"}'
  APP_ENV      = 'production'
  APP_DEBUG    = 'false'
  APP_TIMEZONE = 'UTC'
  MODE         = 'API'

# DATABASE_URL and CRON_TOKEN are injected via `fly secrets set`. The app's
# Kernel parses DATABASE_URL into the discrete DB_* vars config.yml expects.

# Two processes from the same image:
#   app  = Apache serving /v1/* and /health
#   cron = supercronic reading .flyio/crontab and POSTing to immunity-api.internal/v1/internal/tick
[processes]
  app  = "apache2-foreground"
  cron = "/usr/local/bin/supercronic /var/www/html/.flyio/crontab"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'shared-cpu-4x'
  memory = '4gb'
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  processes = ['cron']
