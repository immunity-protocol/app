services:
  webserver:
    build:
      context: "./docker/services/php"
    container_name: "immunity_webserver"
    restart: 'no'
    ports:
      - "80:80"
      - "443:443"
      - "1080:1080"
    environment:
      MODE: "WEB"
      CRON_TOKEN: "${CRON_TOKEN:-localdev-cron-token}"
    links:
      - database
    volumes:
      - ./:/var/www/html

  api:
    build:
      context: "./docker/services/php"
    container_name: "immunity_api"
    restart: 'no'
    ports:
      - "8081:80"
    environment:
      MODE: "API"
      CRON_TOKEN: "${CRON_TOKEN:-localdev-cron-token}"
    links:
      - database
    volumes:
      - ./:/var/www/html

  cron:
    build:
      context: "./docker/services/php"
    container_name: "immunity_cron"
    restart: 'no'
    environment:
      MODE: "CRON"
      CRON_TOKEN: "${CRON_TOKEN:-localdev-cron-token}"
    volumes:
      - ./:/var/www/html
    depends_on:
      - database
      - api
    command: ["/usr/local/bin/supercronic", "/var/www/html/docker/crontab"]

  database:
    build:
      context: "./docker/services/postgres"
    container_name: ${DB_HOST}
    restart: 'no'
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
