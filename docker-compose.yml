services:
  webserver:
    build:
      context: "./docker/services/php"
    container_name: "immunity_webserver"
    restart: 'no'
    ports:
      - "80:80"
      - "443:443"
      - "1080:1080"
    environment:
      MODE: "WEB"
      CRON_TOKEN: "${CRON_TOKEN:-localdev-cron-token}"
    links:
      - database
    volumes:
      - ./:/var/www/html

  api:
    build:
      context: "./docker/services/php"
    container_name: "immunity_api"
    restart: 'no'
    ports:
      - "8081:80"
    environment:
      MODE: "API"
      CRON_TOKEN: "${CRON_TOKEN:-localdev-cron-token}"
    links:
      - database
    volumes:
      - ./:/var/www/html

  cron:
    build:
      context: "./docker/services/php"
    container_name: "immunity_cron"
    restart: 'no'
    environment:
      MODE: "CRON"
      CRON_TOKEN: "${CRON_TOKEN:-localdev-cron-token}"
    volumes:
      - ./:/var/www/html
    depends_on:
      - database
      - api
    command: ["/usr/local/bin/supercronic", "/var/www/html/docker/crontab"]

  indexer:
    build:
      context: "./docker/services/php"
    container_name: "immunity_indexer"
    restart: 'no'
    environment:
      MODE: "INDEXER"
      OG_RPC_URL: "${OG_RPC_URL:-https://evmrpc-testnet.0g.ai}"
      OG_REGISTRY_ADDRESS: "${OG_REGISTRY_ADDRESS:-0x6FfB52ea1a01ABDe2793f6fca2Ea6661ca75903c}"
      OG_STORAGE_INDEXER: "${OG_STORAGE_INDEXER:-https://indexer-storage-testnet-turbo.0g.ai}"
      ETH_RPC_URL: "${ETH_RPC_URL:-https://eth.llamarpc.com}"
      INDEXER_POLL_INTERVAL_MS: "${INDEXER_POLL_INTERVAL_MS:-2000}"
      INDEXER_HYDRATION_CONCURRENCY: "${INDEXER_HYDRATION_CONCURRENCY:-5}"
      INDEXER_BACKFILL_CHUNK: "${INDEXER_BACKFILL_CHUNK:-5000}"
      INDEXER_CONFIRMATIONS: "${INDEXER_CONFIRMATIONS:-2}"
      MORALIS_API_KEY: "${MORALIS_API_KEY:-}"
    volumes:
      - ./:/var/www/html
    depends_on:
      - database
    command:
      - "sh"
      - "-c"
      - |
        cd /var/www/html/scripts \
          && (test -d node_modules || npm install --legacy-peer-deps --omit=dev --no-audit --no-fund) \
          && exec php /var/www/html/bin/indexer.php

  database:
    build:
      context: "./docker/services/postgres"
    container_name: ${DB_HOST}
    restart: 'no'
    ports:
      - "5432:5432"
    volumes:
      - ./sql:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
