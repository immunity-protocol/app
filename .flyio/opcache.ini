; OPcache configuration for production.
;
; Without opcache, every request reparses every PHP file from disk:
; the Zephyrus autoloader alone touches dozens of class files per
; request, on top of the controllers, services, brokers, and entities.
; Enabling opcache typically lifts request throughput 3-5x with no
; code changes.

zend_extension=opcache.so

opcache.enable=1
opcache.enable_cli=0

; Memory budget for cached opcodes. The whole app + vendor is well under
; 128MB; 96MB leaves headroom on a 512MB machine.
opcache.memory_consumption=96

; Up to ~10k cached scripts. Zephyrus + Latte + app code lands well below.
opcache.max_accelerated_files=10000

; Wasted-memory % that triggers a restart of the cache. 5% keeps the
; cache fresh without thrashing.
opcache.max_wasted_percentage=5

; Production: skip filesystem stat calls on every include. We rebuild the
; image on every deploy, so file mtimes only change between deploys.
; If you ever hot-edit files in the running container, set this back to 1
; or call opcache_reset() manually.
opcache.validate_timestamps=0

; Interned-strings buffer (deduplicates identical strings across scripts).
opcache.interned_strings_buffer=16

; Bake fewer comments into the cached opcodes, smaller memory footprint.
opcache.save_comments=1

; Reasonable defaults; left explicit so they're not silently changed.
opcache.fast_shutdown=1
opcache.jit=tracing
opcache.jit_buffer_size=32M
