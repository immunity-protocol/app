application:
  environment: !env APP_ENV, dev
  debug: !env APP_DEBUG, true

session:
  name: "ZSESSID"
  lifetime: 0
  http_only: true
  secure: false
  same_site: "Lax"
  cookie_path: "/"

security:
  force_https: false
  allowed_hosts: []
  max_body_size: 10485760
  trusted_proxies: []
  csrf:
    enabled: true
    auto_html: false
    exceptions: []
  encryption:
    key: !env ENCRYPTION_KEY

localization:
  locale: "en"
  supported_locales:
    - "en"
  locale_path: "locale"
  timezone: !env APP_TIMEZONE, UTC
  currency: !env APP_CURRENCY, USD
  date_format: "MMMM d, yyyy"
  time_format: "h:mm a"
  datetime_format: "MMMM d, yyyy h:mm a"

database:
  host: !env DB_HOST, localhost
  port: !env DB_PORT, 5432
  database: !env DB_NAME, zephyrus
  username: !env DB_USERNAME, dev
  password: !env DB_PASSWORD, dev
  charset: "utf8"

project:
  name: "Immunity"
  version: "0.1.0"
  maintenance: false

render:
  engine: "latte"
  directory: "app/Views"
  cache: "cache/latte"
  mode: "always"

mailer:
  smtp:
    host: "localhost"
    port: 1025
    username: ""
    password: ""
    encryption: "none"
  from:
    address: "noreply@localhost"
    name: "Immunity"
