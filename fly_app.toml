# fly.toml app configuration file generated for immunity-app on 2026-04-25T21:23:52-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'immunity-app'
primary_region = 'yyz'

[build]
  dockerfile = '.flyio/Dockerfile.app'

[env]
  APP_DEBUG = 'false'
  APP_ENV = 'production'
  APP_TIMEZONE = 'UTC'
  MODE = 'WEB'

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  size = 'performance-cpu-2x'
  memory = '4gb'
