app = 'immunity-indexer'
primary_region = 'yyz'

[build]
  dockerfile = '.flyio/Dockerfile.app'

[env]
  APP_ENV                   = 'production'
  APP_DEBUG                 = 'false'
  APP_TIMEZONE              = 'UTC'
  MODE                      = 'INDEXER'
  OG_RPC_URL                = 'https://evmrpc-testnet.0g.ai'
  OG_REGISTRY_ADDRESS       = '0x6FfB52ea1a01ABDe2793f6fca2Ea6661ca75903c'
  OG_STORAGE_INDEXER        = 'https://indexer-storage-testnet-turbo.0g.ai'
  ETH_RPC_URL               = 'https://eth.llamarpc.com'
  INDEXER_POLL_INTERVAL_MS  = '10000'
  INDEXER_HYDRATION_CONCURRENCY = '5'
  INDEXER_BACKFILL_CHUNK    = '5000'
  INDEXER_CONFIRMATIONS     = '2'

# DATABASE_URL is injected via `fly secrets set`. The Kernel parses it into
# the discrete DB_* vars config.yml expects. ETH_RPC_URL can be overridden
# with a paid mainnet RPC via `fly secrets set` for higher ENS throughput.
# MORALIS_API_KEY is also a Fly secret — without it, the indexer logs a
# warning and writes NULL value_at_risk_usd for all events.

[processes]
  indexer = "/bin/sh -c 'cd /var/www/html/scripts && (test -d node_modules || npm install --legacy-peer-deps --omit=dev --no-audit --no-fund) && exec php /var/www/html/bin/indexer.php'"

# No HTTP service: the indexer is a long-running worker, not a server.
# Memory ceiling is enforced inside the supervisor; we restart on exit.
[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['indexer']

[deploy]
  strategy = 'immediate'
